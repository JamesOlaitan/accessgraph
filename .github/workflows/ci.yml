name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify module dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: |
          go test \
            -race \
            -count=1 \
            -timeout 180s \
            -coverprofile=coverage.txt \
            -coverpkg=./internal/... \
            ./tests/...

      - name: Enforce coverage gate (55%)
        run: |
          total=$(go tool cover -func=coverage.txt | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          # Target: 75% total, 80% for core packages. Current: ~60%. Gate set conservatively below current level to prevent regressions. Will be raised as integration tests are added.
          if awk "BEGIN {exit !($total < 55.0)}"; then
            echo "Coverage ${total}% is below the required 55% threshold."
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.txt
          retention-days: 14

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: "v2.11.2"
          args: --timeout 5m

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
